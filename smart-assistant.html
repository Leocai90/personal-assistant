<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能数字人秘书 - 自我学习版</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #e2e8f0;
            overflow-x: hidden;
        }
        .version-badge {
            position: fixed;
            top: 10px;
            right: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .app-container {
            display: grid;
            grid-template-columns: 1fr 400px;
            height: 100vh;
            overflow: hidden;
        }
        .main-chat {
            display: flex;
            flex-direction: column;
            padding: 25px;
            overflow-y: auto;
        }
        .sidebar {
            background: rgba(15, 23, 42, 0.95);
            border-left: 1px solid rgba(99, 102, 241, 0.2);
            padding: 20px;
            overflow-y: auto;
            backdrop-filter: blur(20px);
        }
        .avatar-container {
            width: 140px;
            height: 140px;
            margin: 25px auto;
            position: relative;
        }
        .avatar {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            box-shadow: 0 0 60px rgba(102, 126, 234, 0.6);
            animation: pulse 3s ease-in-out infinite;
            position: relative;
        }
        .avatar::after {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #667eea;
            animation: spin 2s linear infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 60px rgba(102, 126, 234, 0.6); }
            50% { transform: scale(1.08); box-shadow: 0 0 80px rgba(102, 126, 234, 0.8); }
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .message {
            margin-bottom: 24px;
            animation: slideIn 0.4s ease-out;
            position: relative;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.assistant {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15) 0%, rgba(139, 92, 246, 0.15) 100%);
            padding: 20px 24px;
            border-radius: 24px 24px 24px 6px;
            max-width: 85%;
            border: 1px solid rgba(99, 102, 241, 0.3);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.1);
        }
        .message.user {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.25) 0%, rgba(99, 102, 241, 0.25) 100%);
            padding: 20px 24px;
            border-radius: 24px 24px 6px 24px;
            max-width: 85%;
            margin-left: auto;
            border: 1px solid rgba(59, 130, 246, 0.3);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.1);
        }
        .message.system {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.15) 0%, rgba(251, 146, 60, 0.15) 100%);
            padding: 16px 20px;
            border-radius: 16px;
            border-left: 4px solid #ef4444;
            max-width: 90%;
            margin: 15px auto;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .message.learning {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.15) 0%, rgba(132, 204, 22, 0.15) 100%);
            padding: 16px 20px;
            border-radius: 16px;
            border-left: 4px solid #22c55e;
            max-width: 90%;
            margin: 15px auto;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        .message-content {
            line-height: 1.8;
            font-size: 15px;
        }
        .message-content strong {
            color: #a5b4fc;
            font-weight: 600;
        }
        .message-content em {
            color: #c4b5fd;
            font-style: italic;
        }
        .input-area {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid rgba(99, 102, 241, 0.2);
            background: rgba(15, 23, 42, 0.8);
            border-radius: 20px;
            padding: 25px;
        }
        .input-group {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        .chat-input {
            flex: 1;
            background: rgba(30, 41, 59, 0.9);
            border: 2px solid rgba(99, 102, 241, 0.3);
            border-radius: 16px;
            padding: 18px 24px;
            color: #e2e8f0;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
            resize: none;
            min-height: 56px;
        }
        .chat-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 25px rgba(102, 126, 234, 0.3);
        }
        .send-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50%;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.5);
            flex-shrink: 0;
        }
        .send-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 25px rgba(102, 126, 234, 0.7);
        }
        .section {
            margin-bottom: 28px;
        }
        .section-title {
            font-size: 13px;
            font-weight: 700;
            color: #94a3b8;
            margin-bottom: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding-bottom: 8px;
            border-bottom: 2px solid rgba(99, 102, 241, 0.2);
        }
        .card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 14px;
            transition: all 0.3s;
            cursor: pointer;
        }
        .card:hover {
            background: rgba(30, 41, 59, 0.9);
            border-color: rgba(102, 126, 234, 0.5);
            transform: translateX(8px);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.2);
        }
        .card-content {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .card-title {
            font-weight: 600;
            margin-bottom: 8px;
            color: #e2e8f0;
            line-height: 1.5;
        }
        .card-meta {
            font-size: 12px;
            color: #94a3b8;
        }
        .tag {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 14px;
            font-size: 11px;
            font-weight: 600;
            margin-right: 6px;
            margin-top: 8px;
        }
        .tag-high { background: rgba(239, 68, 68, 0.3); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.4); }
        .tag-medium { background: rgba(251, 191, 36, 0.3); color: #fcd34d; border: 1px solid rgba(251, 191, 36, 0.4); }
        .tag-low { background: rgba(34, 197, 94, 0.3); color: #86efac; border: 1px solid rgba(34, 197, 94, 0.4); }
        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 12px 0;
        }
        .typing-indicator span {
            width: 10px;
            height: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            animation: typing 1.6s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.5; }
            50% { transform: translateY(-8px) scale(1.1); opacity: 1; }
        }
        .quick-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .quick-action {
            background: rgba(30, 41, 59, 0.7);
            border: 2px solid rgba(99, 102, 241, 0.3);
            color: #e2e8f0;
            padding: 10px 18px;
            border-radius: 22px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }
        .quick-action:hover {
            background: rgba(102, 126, 234, 0.3);
            border-color: rgba(102, 126, 234, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        .empty-state {
            text-align: center;
            padding: 45px 25px;
            color: #64748b;
            font-size: 14px;
        }
        .time-display {
            text-align: center;
            font-size: 42px;
            font-weight: 200;
            color: #e2e8f0;
            margin-bottom: 10px;
            letter-spacing: 3px;
        }
        .date-display {
            text-align: center;
            color: #94a3b8;
            font-size: 15px;
            margin-bottom: 25px;
        }
        .assistant-name {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            color: #e2e8f0;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .assistant-status {
            text-align: center;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 25px;
        }
        .assistant-status span {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        .knowledge-display {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.1) 0%, rgba(132, 204, 22, 0.1) 100%);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 14px;
        }
        .knowledge-tag {
            display: inline-block;
            background: rgba(34, 197, 94, 0.2);
            color: #86efac;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            margin: 3px;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        .learning-progress {
            height: 4px;
            background: rgba(30, 41, 59, 0.8);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 8px;
        }
        .learning-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #22c55e 0%, #4ade80 100%);
            transition: width 0.5s ease;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .stat-item {
            background: rgba(30, 41, 59, 0.7);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        .stat-number {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-label {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 4px;
        }
        .suggestion-chip {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2) 0%, rgba(139, 92, 246, 0.2) 100%);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: #c4b5fd;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-block;
            margin: 4px;
        }
        .suggestion-chip:hover {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.4) 0%, rgba(139, 92, 246, 0.4) 100%);
            transform: translateY(-2px);
        }
        .markdown-content {
            font-size: 14px;
            line-height: 1.7;
        }
        .markdown-content h1 { font-size: 20px; margin: 16px 0 12px; color: #e2e8f0; }
        .markdown-content h2 { font-size: 18px; margin: 14px 0 10px; color: #e2e8f0; }
        .markdown-content h3 { font-size: 16px; margin: 12px 0 8px; color: #e2e8f0; }
        .markdown-content p { margin: 10px 0; }
        .markdown-content ul { margin: 10px 0; padding-left: 20px; }
        .markdown-content li { margin: 6px 0; }
        .markdown-content code {
            background: rgba(30, 41, 59, 0.8);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
        }
        .markdown-content pre {
            background: rgba(15, 23, 42, 0.9);
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 12px 0;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }
        .draft-preview {
            background: rgba(15, 23, 42, 0.9);
            border: 2px dashed rgba(99, 102, 241, 0.4);
            border-radius: 16px;
            padding: 24px;
            margin-top: 20px;
            line-height: 1.8;
            font-size: 14px;
        }
        @media (max-width: 1024px) {
            .app-container {
                grid-template-columns: 1fr;
            }
            .sidebar {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="version-badge">🧠 智能数字人秘书 V3.0 自我学习版</div>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 知识库数据
        const KNOWLEDGE_BASE = {
            金融: {
                topics: ['投资策略', '风险管理', '市场分析', '个人理财', '经济趋势'],
                insights: ['多元化投资降低风险', '长期投资胜过短期投机', '市场周期是投资的朋友'],
                sources: ['财经新闻', '研究报告', '市场数据']
            },
            AI: {
                topics: ['机器学习', '深度学习', '自然语言处理', '计算机视觉', 'AI应用'],
                insights: ['AI正在改变各行各业', '数据质量决定AI表现', '可解释AI的重要性'],
                sources: ['技术论文', '行业报告', '开源项目']
            },
            科技: {
                topics: ['区块链', '云计算', '物联网', '5G技术', '量子计算'],
                insights: ['技术迭代加速', '数字化是趋势', '安全问题日益重要'],
                sources: ['科技媒体', '技术博客', '研究机构']
            },
            体育: {
                topics: ['训练方法', '营养科学', '运动心理学', '康复训练', '数据分析'],
                insights: ['科学训练提升效果', '恢复和训练同样重要', '数据分析优化决策'],
                sources: ['体育科学期刊', '教练经验', '运动员反馈']
            },
            文学: {
                topics: ['古典文学', '现代文学', '诗歌创作', '文学批评', '翻译研究'],
                insights: ['文学反映时代精神', '经典作品历久弥新', '阅读拓宽视野'],
                sources: ['文学期刊', '书评', '作家访谈']
            },
            艺术: {
                topics: ['绘画技法', '艺术史', '当代艺术', '数字艺术', '设计美学'],
                insights: ['艺术需要创新和传承', '美是主观的也是客观的', '艺术与技术融合'],
                sources: ['艺术展览', '艺术评论', '艺术家工作室']
            },
            新闻: {
                topics: ['国际政治', '经济新闻', '科技新闻', '社会新闻', '文化新闻'],
                insights: ['新闻需要客观准确', '深度思考表面现象', '信息茧房要警惕'],
                sources: ['主流媒体', '新闻分析', '专家观点']
            }
        };

        // 建议生成器
        const SUGGESTION_ENGINE = {
            finance: (todos) => [
                '建议定期复盘投资组合',
                '关注市场动态，及时调整策略',
                '学习新的理财知识'
            ],
            ai: (todos) => [
                '跟进最新AI技术发展',
                '实践AI项目应用',
                '参与AI社区讨论'
            ],
            productivity: (todos) => [
                '优化时间管理',
                '使用番茄工作法',
                '定期回顾目标'
            ],
            creativity: (todos) => [
                '定期记录灵感',
                '跨领域学习激发创新',
                '与他人交流想法'
            ]
        };

        function App() {
            const [messages, setMessages] = useState([]);
            const [todos, setTodos] = useState([]);
            const [ideas, setIdeas] = useState([]);
            const [reminders, setReminders] = useState([]);
            const [knowledge, setKnowledge] = useState({});
            const [learningProgress, setLearningProgress] = useState({
                金融: 30,
                AI: 45,
                科技: 35,
                体育: 20,
                文学: 25,
                艺术: 15,
                新闻: 40
            });
            const [learningPreferences, setLearningPreferences] = useState({
                金融: true,
                AI: true,
                科技: true,
                体育: false,
                文学: false,
                艺术: false,
                新闻: true
            });
            const [inputValue, setInputValue] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [isLearning, setIsLearning] = useState(false);
            const messagesEndRef = useRef(null);

            useEffect(() => {
                loadData();
                setTimeout(() => {
                    addMessage(greetingMessage(), 'assistant');
                }, 500);

                // 自动学习
                startAutoLearning();
            }, []);

            useEffect(() => {
                saveData();
            }, [todos, ideas, reminders, messages, knowledge, learningProgress]);

            useEffect(() => {
                scrollToBottom();
            }, [messages, isTyping]);

            const loadData = () => {
                const savedTodos = localStorage.getItem('smart_assistant_todos');
                const savedIdeas = localStorage.getItem('smart_assistant_ideas');
                const savedReminders = localStorage.getItem('smart_assistant_reminders');
                const savedMessages = localStorage.getItem('smart_assistant_messages');
                const savedKnowledge = localStorage.getItem('smart_assistant_knowledge');
                const savedProgress = localStorage.getItem('smart_assistant_learning_progress');

                if (savedTodos) setTodos(JSON.parse(savedTodos));
                if (savedIdeas) setIdeas(JSON.parse(savedIdeas));
                if (savedReminders) setReminders(JSON.parse(savedReminders));
                if (savedMessages) setMessages(JSON.parse(savedMessages));
                if (savedKnowledge) setKnowledge(JSON.parse(savedKnowledge));
                if (savedProgress) setLearningProgress(JSON.parse(savedProgress));
            };

            const saveData = () => {
                localStorage.setItem('smart_assistant_todos', JSON.stringify(todos));
                localStorage.setItem('smart_assistant_ideas', JSON.stringify(ideas));
                localStorage.setItem('smart_assistant_reminders', JSON.stringify(reminders));
                localStorage.setItem('smart_assistant_messages', JSON.stringify(messages));
                localStorage.setItem('smart_assistant_knowledge', JSON.stringify(knowledge));
                localStorage.setItem('smart_assistant_learning_progress', JSON.stringify(learningProgress));
            };

            const startAutoLearning = () => {
                setInterval(() => {
                    performLearning();
                }, 300000); // 每5分钟学习一次
            };

            const performLearning = () => {
                setIsLearning(true);

                // 模拟学习过程
                Object.keys(KNOWLEDGE_BASE).forEach(category => {
                    if (learningPreferences[category]) {
                        const base = KNOWLEDGE_BASE[category];
                        const randomInsight = base.insights[Math.floor(Math.random() * base.insights.length)];
                        const randomTopic = base.topics[Math.floor(Math.random() * base.topics.length)];

                        setKnowledge(prev => ({
                            ...prev,
                            [category]: {
                                ...prev[category],
                                lastLearned: new Date().toISOString(),
                                recentInsight: randomInsight,
                                recentTopic: randomTopic,
                                insights: [...(prev[category]?.insights || []), {
                                    content: randomInsight,
                                    topic: randomTopic,
                                    timestamp: new Date().toISOString()
                                }].slice(-10)
                            }
                        }));

                        // 增加学习进度
                        setLearningProgress(prev => ({
                            ...prev,
                            [category]: Math.min(100, prev[category] + Math.random() * 5)
                        }));
                    }
                });

                setTimeout(() => setIsLearning(false), 2000);
            };

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            };

            const greetingMessage = () => {
                const hour = new Date().getHours();
                let greeting = '晚上好';
                if (hour < 6) greeting = '凌晨好';
                else if (hour < 9) greeting = '早上好';
                else if (hour < 12) greeting = '上午好';
                else if (hour < 14) greeting = '中午好';
                else if (hour < 18) greeting = '下午好';

                return `<div class="message-content">
                    👋 <strong>${greeting}！</strong> 我是你的智能数字人秘书。

                    我具备以下能力：

                    📝 <strong>智能记录</strong>：理解你的自然语言，自动分类为待办、灵感、提醒
                    💡 <strong>知识学习</strong>：持续学习金融、AI、科技等领域，不断成长
                    🔔 <strong>主动提醒</strong>：在关键时刻提醒你重要事项
                    ✨ <strong>内容创作</strong>：基于你的灵感，创作文章、方案等
                    🤔 <strong>建议反馈</strong>：基于所学知识，提供个性化建议

                    <em>我可以这样帮你：</em>

                    "明天下午3点有个重要会议要参加"
                    "突然想到一个关于AI在教育中的应用的想法"
                    "最近金融市场的变化给了我一些投资启发"
                    "帮我把关于AI技术的想法整理成一篇深度文章"

                    <strong>我正在持续学习中...</strong> 目前掌握了 ${Object.values(learningProgress).reduce((a, b) => a + b, 0) / 7}% 的知识容量。

                    有什么我可以帮你的吗？
                </div>`;
            };

            const parseInput = (text) => {
                const lowerText = text.toLowerCase();
                const result = {
                    type: 'unknown',
                    content: text,
                    priority: 'medium',
                    dueDate: null,
                    reminderDate: null,
                    category: 'general',
                    tags: [],
                    domains: []
                };

                // 时间解析
                const timePatterns = {
                    '今天': () => new Date(),
                    '明天': () => {
                        const d = new Date();
                        d.setDate(d.getDate() + 1);
                        return d;
                    },
                    '后天': () => {
                        const d = new Date();
                        d.setDate(d.getDate() + 2);
                        return d;
                    },
                    '下周': () => {
                        const d = new Date();
                        d.setDate(d.getDate() + 7);
                        return d;
                    },
                    '本周': () => {
                        const d = new Date();
                        const day = d.getDay() || 7;
                        d.setDate(d.getDate() + (7 - day));
                        return d;
                    }
                };

                for (const [keyword, dateFunc] of Object.entries(timePatterns)) {
                    if (lowerText.includes(keyword)) {
                        result.dueDate = dateFunc().toISOString().split('T')[0];
                        break;
                    }
                }

                const timeMatch = text.match(/(\d{1,2})[:：](\d{2})/);
                if (timeMatch && result.dueDate) {
                    const [_, hours, minutes] = timeMatch;
                    const date = new Date(result.dueDate);
                    date.setHours(parseInt(hours), parseInt(minutes));
                    result.dueDate = date.toISOString();
                    result.reminderDate = date.toISOString();
                }

                // 类型判断
                if (lowerText.includes('待办') || lowerText.includes('任务') || lowerText.includes('要做') ||
                    lowerText.includes('完成') || lowerText.includes('记得') || lowerText.includes('重要')) {
                    result.type = 'todo';
                } else if (lowerText.includes('想法') || lowerText.includes('灵感') || lowerText.includes('点子') ||
                               lowerText.includes('创意') || lowerText.includes('突然想到') || lowerText.includes('启发')) {
                    result.type = 'idea';
                } else if (lowerText.includes('提醒') || lowerText.includes('记得提醒') || lowerText.includes('别忘了')) {
                    result.type = 'reminder';
                } else if (lowerText.includes('创作') || lowerText.includes('写一篇') || lowerText.includes('生成') ||
                               lowerText.includes('整理') || lowerText.includes('帮我写') || lowerText.includes('深度')) {
                    result.type = 'create';
                } else if (lowerText.includes('完成') || lowerText.includes('搞定') || lowerText.includes('已做') || lowerText.includes('做完了')) {
                    result.type = 'complete';
                } else if (lowerText.includes('学习') || lowerText.includes('了解') || lowerText.includes('想知道') || lowerText.includes('什么是')) {
                    result.type = 'learn';
                } else if (lowerText.includes('建议') || lowerText.includes('看法') || lowerText.includes('怎么想') || lowerText.includes('怎么看')) {
                    result.type = 'suggest';
                }

                // 优先级判断
                if (lowerText.includes('重要') || lowerText.includes('紧急') || lowerText.includes('优先')) {
                    result.priority = 'high';
                } else if (lowerText.includes('不急') || lowerText.includes('有空') || lowerText.includes('慢慢')) {
                    result.priority = 'low';
                }

                // 分类判断
                if (lowerText.includes('工作') || lowerText.includes('项目') || lowerText.includes('会议')) {
                    result.category = 'work';
                } else if (lowerText.includes('学习') || lowerText.includes('看书') || lowerText.includes('课程')) {
                    result.category = 'learning';
                } else if (lowerText.includes('生活') || lowerText.includes('个人') || lowerText.includes('日常')) {
                    result.category = 'life';
                }

                // 知识领域判断
                Object.keys(KNOWLEDGE_BASE).forEach(domain => {
                    if (lowerText.includes(domain.toLowerCase()) ||
                        KNOWLEDGE_BASE[domain].topics.some(topic => lowerText.includes(topic.toLowerCase()))) {
                        result.domains.push(domain);
                    }
                });

                return result;
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!inputValue.trim()) return;

                addMessage(inputValue, 'user');
                setInputValue('');
                setIsTyping(true);

                await new Promise(resolve => setTimeout(resolve, 1200 + Math.random() * 1500));

                const parsed = parseInput(inputValue);
                let response = '';

                switch (parsed.type) {
                    case 'todo':
                        handleAddTodo(parsed);
                        response = generateTodoResponse(parsed);
                        break;
                    case 'idea':
                        handleAddIdea(parsed);
                        response = generateIdeaResponse(parsed);
                        break;
                    case 'reminder':
                        handleAddReminder(parsed);
                        response = generateReminderResponse(parsed);
                        break;
                    case 'create':
                        response = await handleCreateContent(parsed);
                        break;
                    case 'complete':
                        response = await handleCompleteTask(parsed);
                        break;
                    case 'learn':
                        response = generateLearnResponse(parsed);
                        break;
                    case 'suggest':
                        response = generateSuggestResponse(parsed);
                        break;
                    default:
                        response = await handleGeneralQuery(parsed);
                }

                addMessage(response, 'assistant');
                setIsTyping(false);
            };

            const handleAddTodo = (parsed) => {
                const todo = {
                    id: Date.now(),
                    title: parsed.content,
                    priority: parsed.priority,
                    dueDate: parsed.dueDate,
                    reminderDate: parsed.reminderDate,
                    completed: false,
                    domains: parsed.domains,
                    createdAt: new Date().toISOString()
                };
                setTodos(prev => [todo, ...prev]);
            };

            const generateTodoResponse = (parsed) => {
                const priorityText = parsed.priority === 'high' ? '⚡ <strong>高优先级</strong>' : parsed.priority === 'low' ? '📝 <strong>普通优先级</strong>' : '📋 <strong>中等优先级</strong>';
                const timeText = parsed.dueDate ? `，截止时间：${new Date(parsed.dueDate).toLocaleDateString('zh-CN')}` : '';
                const domainsText = parsed.domains.length > 0 ? `\n📚 相关领域：${parsed.domains.join('、')}` : '';

                return `<div class="message-content">
                    ✅ 已为你记录：<span class="highlight">${parsed.content}</span>
                    ${priorityText}${timeText}${domainsText}

                    我会在到期时提醒你完成！
                </div>`;
            };

            const handleAddIdea = (parsed) => {
                const idea = {
                    id: Date.now(),
                    title: parsed.content,
                    category: parsed.category,
                    tags: [],
                    domains: parsed.domains,
                    createdAt: new Date().toISOString()
                };
                setIdeas(prev => [idea, ...prev]);
            };

            const generateIdeaResponse = (parsed) => {
                const categoryText = parsed.category === 'work' ? '💼 工作' : parsed.category === 'learning' ? '📚 学习' : '💭 生活';
                const domainsText = parsed.domains.length > 0 ? `\n📚 关联知识领域：${parsed.domains.join('、')}` : '';

                return `<div class="message-content">
                    💡 已记录你的灵感：<strong>${parsed.content}</strong>
                    分类：${categoryText}${domainsText}

                    这个想法很有价值！我可以帮你：
                    • 稍后整合这些灵感
                    • 深化这个想法
                    • 基于灵感创作内容

                    ${parsed.domains.length > 0 ? `\n我注意到这个想法与${parsed.domains.join('、')}领域相关，我已经建立知识关联！` : ''}
                </div>`;
            };

            const handleAddReminder = (parsed) => {
                const reminder = {
                    id: Date.now(),
                    title: parsed.content,
                    reminderDate: parsed.dueDate || new Date(Date.now() + 3600000).toISOString(),
                    notified: false,
                    createdAt: new Date().toISOString()
                };
                setReminders(prev => [reminder, ...prev]);
            };

            const generateReminderResponse = (parsed) => {
                const timeText = parsed.dueDate ? new Date(parsed.dueDate).toLocaleString('zh-CN') : '一小时后';
                return `<div class="message-content">
                    🔔 已设置提醒：<strong>${parsed.content}</strong>
                    提醒时间：${timeText}

                    我会准时提醒你！
                </div>`;
            };

            const handleCreateContent = async (parsed) => {
                const relevantIdeas = ideas.filter(idea =>
                    parsed.content.toLowerCase().includes(idea.title.toLowerCase()) ||
                    idea.title.toLowerCase().includes('技术') ||
                    idea.title.toLowerCase().includes('想法') ||
                    idea.domains.some(domain => parsed.content.toLowerCase().includes(domain.toLowerCase()))
                ).slice(0, 5);

                if (relevantIdeas.length === 0) {
                    return `<div class="message-content">
                        📝 你希望我创作什么内容？

                        目前我记录了 ${ideas.length} 个灵感，你可以：
                        • 告诉我你想写关于什么主题
                        • 让我基于特定灵感创作
                        • 或者先记录一些想法
                    </div>`;
                }

                const draft = generateDraft(parsed.content, relevantIdeas);
                const response = `<div class="message-content">
                    ✨ 基于你的 ${relevantIdeas.length} 个相关灵感，我为你准备了以下内容草稿：

                    <div class="draft-preview">${draft}</div>

                    你觉得怎么样？我可以根据你的反馈继续调整。
                </div>`;
                return response;
            };

            const generateDraft = (request, ideas) => {
                const ideaTexts = ideas.map((idea, index) => `${index + 1}. ${idea.title}`).join('\n');
                return `# ${request.replace(/帮我写|创作|生成|整理成|深度|一篇/g, '').trim()}

## 基于你的灵感

${ideaTexts}

## 深度分析

基于以上想法，这篇文章的核心要点包括：

### 创新亮点
• 结合你记录的多个灵感，形成独特的视角
• 融合多领域知识，提供全面的解决方案
• 基于实际经验，确保内容的可行性

### 实用价值
• 提供具体的实施步骤和建议
• 结合当前行业趋势，增加前瞻性
• 考虑实际应用场景，增强可操作性

### 核心观点
${ideas.slice(0, 3).map((idea, i) => `
**${i + 1}. ${idea.title}**
这个想法体现了你对${idea.domains.join('、')}领域的深入思考。
`).join('')}

## 建议结构

### 引言（约300字）
• 阐述背景和重要性
• 引出核心问题
• 展示文章价值

### 主体部分（约1500-2000字）
**第一部分：现象分析**
• 当前现状描述
• 存在的问题
• 发展趋势

**第二部分：深度思考**
• 核心观点阐述
• 理论支撑
• 案例分析

**第三部分：实践路径**
• 具体实施步骤
• 注意事项
• 风险控制

### 结论（约300字）
• 总结核心观点
• 提出建议
• 展望未来

*（这是根据你的灵感和我的知识库生成的深度初稿，字数约2000-2500字。你可以告诉我需要调整哪些部分，或者让我扩展某些内容。）*`;
            };

            const handleCompleteTask = async (parsed) => {
                const matchedTodo = todos.find(todo =>
                    parsed.content.toLowerCase().includes(todo.title.toLowerCase().slice(0, 10)) ||
                    todo.title.toLowerCase().includes('完成')
                );

                if (matchedTodo) {
                    setTodos(prev => prev.map(todo =>
                        todo.id === matchedTodo.id ? { ...todo, completed: true } : todo
                    ));
                    return `<div class="message-content">
                        🎉 太棒了！你完成了：<strong>${matchedTodo.title}</strong>

                        继续保持！今天已经完成了 ${todos.filter(t => t.completed).length + 1} 个任务。

                        ${matchedTodo.domains.length > 0 ? `\n这个任务涉及${matchedTodo.domains.join('、')}领域，我在这个领域的知识储备为 ${matchedTodo.domains.map(d => learningProgress[d]).join('%、')}%。` : ''}
                    </div>`;
                }

                return `<div class="message-content">
                    🤔 我没有找到对应的任务。你想完成哪个任务？

                    你的待办任务有：
                    ${todos.filter(t => !t.completed).slice(0, 5).map(t => `• ${t.title}`).join('\n')}
                </div>`;
            };

            const generateLearnResponse = (parsed) => {
                if (parsed.domains.length === 0) {
                    return `<div class="message-content">
                        📚 我可以为你介绍以下领域的知识：

                        ${Object.keys(KNOWLEDGE_BASE).map(d => `• ${d}：${LEARNING_PROGRESS[d]}% 掌握度`).join('\n')}

                        告诉我你对哪个领域感兴趣，我会根据我所学的知识为你解答！
                    </div>`;
                }

                const domain = parsed.domains[0];
                const progress = learningProgress[domain];
                const base = KNOWLEDGE_BASE[domain];
                const recentKnowledge = knowledge[domain];

                return `<div class="message-content">
                    📚 关于<strong>${domain}</strong>领域，我的知识储备为 ${progress.toFixed(0)}%

                    <strong>核心话题：</strong>
                    ${base.topics.map(t => `• ${t}`).join('\n')}

                    <strong>关键洞察：</strong>
                    ${base.insights.map(i => `• ${i}`).join('\n')}

                    ${recentKnowledge?.recentInsight ? `\n<strong>最新学习心得：</strong>\n${recentKnowledge.recentInsight}\n（关于${recentKnowledge.recentTopic}）` : ''}

                    <em>我正在持续学习这个领域的最新内容，如果你想深入了解某个具体话题，可以告诉我！</em>
                </div>`;
            };

            const generateSuggestResponse = (parsed) => {
                const suggestions = [];
                const pendingTodos = todos.filter(t => !t.completed);

                // 基于任务的建议
                if (pendingTodos.length > 0) {
                    const highPriorityTodos = pendingTodos.filter(t => t.priority === 'high');
                    if (highPriorityTodos.length > 0) {
                        suggestions.push(`🎯 <strong>优先处理：</strong>${highPriorityTodos[0].title}`);
                    }

                    if (pendingTodos.length > 5) {
                        suggestions.push(`📊 <strong>时间管理：</strong>当前有${pendingTodos.length}个待办任务，建议使用番茄工作法提高效率`);
                    }
                }

                // 基于灵感的建议
                if (ideas.length >= 3) {
                    suggestions.push(`✨ <strong>创意整合：</strong>你有${ideas.length}个灵感，我可以帮你整合成完整的方案或文章`);
                }

                // 基于知识的建议
                const topDomains = Object.entries(learningProgress)
                    .filter(([_, value]) => value > 30)
                    .sort((a, b) => b[1] - a[1])
                    .slice(0, 2);

                if (topDomains.length > 0) {
                    suggestions.push(`🧠 <strong>知识应用：</strong>基于我在${topDomains.map(d => d[0]).join('、')}领域的知识，建议关注相关机会`);
                }

                // 基于时间的建议
                const hour = new Date().getHours();
                if (hour >= 9 && hour <= 11) {
                    suggestions.push(`⏰ <strong>黄金时段：</strong>现在是上午，适合处理重要且需要深度思考的任务`);
                } else if (hour >= 14 && hour <= 16) {
                    suggestions.push(`⏰ <strong>高效时段：</strong>下午适合处理具体执行和协作类任务`);
                } else if (hour >= 19 && hour <= 21) {
                    suggestions.push(`⏰ <strong>反思时段：</strong>晚上适合回顾总结、规划明天`);
                }

                if (suggestions.length === 0) {
                    return `<div class="message-content">
                        🤔 基于当前情况，我有以下建议：

                        • 保持记录灵感的好习惯
                        • 定期回顾和学习新知识
                        • 设定清晰的目标和计划

                        有什么具体需要我帮助的吗？
                    </div>`;
                }

                return `<div class="message-content">
                    💭 给你的一些建议：

                    ${suggestions.join('\n\n')}

                    需要我深入解释某些建议吗？或者有其他需要帮助的？
                </div>`;
            };

            const handleGeneralQuery = async (parsed) => {
                const text = parsed.content.toLowerCase();

                if (text.includes('统计') || text.includes('多少') || text.includes('状态')) {
                    const pendingTodos = todos.filter(t => !t.completed).length;
                    const completedTodos = todos.filter(t => t.completed).length;

                    return `<div class="message-content">
                        📊 <strong>当前状态：</strong>

                        📝 待办任务：${pendingTodos} 个
                        ✅ 已完成任务：${completedTodos} 个
                        💡 记录的灵感：${ideas.length} 个
                        🔔 设置的提醒：${reminders.length} 个
                        🧠 知识库容量：${Object.values(learningProgress).reduce((a, b) => a + b, 0).toFixed(0)}%

                        <em>继续保持，你做得很棒！</em>
                    </div>`;
                }

                if (text.includes('待办') || text.includes('任务')) {
                    const pendingTodos = todos.filter(t => !t.completed).slice(0, 5);
                    if (pendingTodos.length === 0) {
                        return `<div class="message-content">
                            🎉 太好了！你现在没有待办任务！

                            需要我帮你添加新的任务吗？
                        </div>`;
                    }
                    return `<div class="message-content">
                        📋 你当前的待办任务：

                        ${pendingTodos.map((t, i) => `${i + 1}. ${t.title}${t.dueDate ? ` (${new Date(t.dueDate).toLocaleDateString('zh-CN')})` : ''}`).join('\n')}

                        需要我帮你处理这些任务吗？
                    </div>`;
                }

                if (text.includes('灵感') || text.includes('想法')) {
                    const recentIdeas = ideas.slice(0, 5);
                    if (recentIdeas.length === 0) {
                        return `<div class="message-content">
                            💡 你还没有记录任何灵感。

                            有什么想法都可以告诉我，我会帮你记录并整理！
                        </div>`;
                    }
                    return `<div class="message-content">
                        💡 你记录的灵感：

                        ${recentIdeas.map((idea, i) => `${i + 1}. ${idea.title}${idea.domains.length > 0 ? ` [${idea.domains.join(', ')}]` : ''}`).join('\n')}

                        需要我基于这些灵感创作内容吗？
                    </div>`;
                }

                // 默认处理
                return `<div class="message-content">
                    我理解你想说：<strong>${parsed.content}</strong>

                    让我来帮你处理...

                    • 如果这是任务，我会记录下来
                    • 如果是灵感，我会为你保存
                    • 如果是提醒，我会准时通知你
                    • 如果是学习需求，我会基于我的知识库回答

                    ${parsed.domains.length > 0 ? `\n我注意到这与${parsed.domains.join('、')}领域相关，我已经建立了知识关联！` : ''}

                    需要我进一步协助吗？
                </div>`;
            };

            const handleQuickAction = (action) => {
                setInputValue(action);
            };

            const getPendingTodos = () => todos.filter(t => !t.completed);
            const getRecentIdeas = () => ideas.slice(0, 5);

            return (
                <div class="app-container">
                    <div class="main-chat">
                        <div class="date-display">
                            <h1 class="time-display">
                                {new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })}
                            </h1>
                            <p>{new Date().toLocaleDateString('zh-CN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</p>
                        </div>

                        {isLearning && (
                            <div className="message learning">
                                <div className="message-content">
                                    🧠 <strong>正在学习新知识...</strong><br/>
                                    我正在阅读最新的金融、AI、科技等领域内容，不断提升自己的知识储备。
                                </div>
                            </div>
                        )}

                        {messages.length === 0 && (
                            <div class="quick-actions">
                                <button class="quick-action" onClick={() => handleQuickAction('明天下午3点有个重要会议要参加')}>明天下午3点有个重要会议要参加</button>
                                <button class="quick-action" onClick={() => handleQuickAction('突然想到一个关于AI在教育中的应用的想法')}>突然想到一个关于AI在教育中的应用的想法</button>
                                <button class="quick-action" onClick={() => handleQuickAction('最近金融市场的变化给了我一些投资启发')}>最近金融市场的变化给了我一些投资启发</button>
                                <button class="quick-action" onClick={() => handleQuickAction('帮我把关于AI技术的想法整理成一篇深度文章')}>帮我把关于AI技术的想法整理成一篇深度文章</button>
                                <button class="quick-action" onClick={() => handleQuickAction('我想了解AI领域的最新知识')}>我想了解AI领域的最新知识</button>
                                <button class="quick-action" onClick={() => handleQuickAction('给我一些建议')}>给我一些建议</button>
                            </div>
                        )}

                        <div class="messages">
                            {messages.map((message) => (
                                <div key={message.id} class={`message ${message.type}`}>
                                    <div class="message-content" dangerouslySetInnerHTML={{ __html: message.content }} />
                                </div>
                            ))}
                            {isTyping && (
                                <div class="message assistant">
                                    <div class="typing-indicator">
                                        <span></span>
                                        <span></span>
                                        <span></span>
                                    </div>
                                </div>
                            )}
                            <div ref={messagesEndRef} />
                        </div>

                        <div class="input-area">
                            <form onSubmit={handleSubmit} class="input-group">
                                <textarea
                                    class="chat-input"
                                    placeholder="用自然语言告诉我你的想法、任务、需求或问题..."
                                    value={inputValue}
                                    onChange={(e) => setInputValue(e.target.value)}
                                    onKeyDown={(e) => {
                                        if (e.key === 'Enter' && !e.shiftKey) {
                                            e.preventDefault();
                                            handleSubmit(e);
                                        }
                                    }}
                                />
                                <button type="submit" class="send-btn">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <line x1="22" y1="2" x2="11" y2="13"></line>
                                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                    </svg>
                                </button>
                            </form>
                        </div>
                    </div>

                    <div class="sidebar">
                        <div class="avatar-container">
                            <div class="avatar">🤖</div>
                        </div>
                        <div class="assistant-name">智能数字人秘书</div>
                        <div class="assistant-status"><span></span>在线 • 持续学习中</div>

                        <div class="section">
                            <div class="section-title">📋 待办事项 ({getPendingTodos().length})</div>
                            {getPendingTodos().length === 0 ? (
                                <div class="empty-state">✨ 没有待办任务</div>
                            ) : (
                                getPendingTodos().slice(0, 4).map(todo => (
                                    <div key={todo.id} class="card" onClick={() => setInputValue(`完成 ${todo.title}`)}>
                                        <div class="card-content">
                                            <div>
                                                <div class="card-title">{todo.title}</div>
                                                {todo.dueDate && <div class="card-meta">截止: {new Date(todo.dueDate).toLocaleDateString('zh-CN')}</div>}
                                            </div>
                                            <span class={`tag tag-${todo.priority}`}>{todo.priority === 'high' ? '高' : todo.priority === 'medium' ? '中' : '低'}</span>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>

                        <div class="section">
                            <div class="section-title">💡 灵感想法 ({ideas.length})</div>
                            {ideas.length === 0 ? (
                                <div class="empty-state">💭 暂无灵感记录</div>
                            ) : (
                                getRecentIdeas().map(idea => (
                                    <div key={idea.id} class="card" onClick={() => setInputValue(`帮我把关于${idea.title}的灵感整理成内容`)}>
                                        <div class="card-content">
                                            <div class="card-title">{idea.title}</div>
                                            <div class="card-meta">{idea.category}</div>
                                            {idea.domains.length > 0 && (
                                                <div>
                                                    {idea.domains.map(d => <span key={d} class="knowledge-tag">{d}</span>)}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>

                        <div class="section">
                            <div class="section-title">🧠 知识学习进度</div>
                            <div class="knowledge-display">
                                {Object.entries(learningProgress).map(([domain, progress]) => (
                                    <div key={domain} style={{ marginBottom: '12px' }}>
                                        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '4px', fontSize: '13px' }}>
                                            <span>{domain}</span>
                                            <span>{progress.toFixed(0)}%</span>
                                        </div>
                                        <div class="learning-progress">
                                            <div class="learning-progress-bar" style={{ width: `${progress}%` }}></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div class="section">
                            <div class="section-title">📊 今日统计</div>
                            <div class="stats-grid">
                                <div class="stat-item">
                                    <div class="stat-number">{todos.filter(t => t.completed).length}</div>
                                    <div class="stat-label">已完成</div>
                                </div>
                                <div class="stat-item">
                                    <div class="stat-number">{getPendingTodos().length}</div>
                                    <div class="stat-label">待处理</div>
                                </div>
                                <div class="stat-item">
                                    <div class="stat-number">{ideas.filter(i => {
                                        const today = new Date().toDateString();
                                        return new Date(i.createdAt).toDateString() === today;
                                    }).length}</div>
                                    <div class="stat-label">新灵感</div>
                                </div>
                                <div class="stat-item">
                                    <div class="stat-number">{Object.values(learningProgress).reduce((a, b) => a + b, 0) / 7}</div>
                                    <div class="stat-label">知识度</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
