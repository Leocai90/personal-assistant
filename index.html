            { icon: 'ri-list-check', title: '任务管理', desc: '待办、提醒、清单' },
            { icon: 'ri-lightbulb-line', title: '灵感记录', desc: '创意、想法、笔记' },
            { icon: 'ri-question-line', title: '知识问答', desc: '解释、解答、学习' },
            { icon: 'ri-translate-2', title: '智能翻译', desc: '多语言、语法纠正' },
            { icon: 'ri-calculator-line', title: '计算工具', desc: '数学、单位转换' },
            { icon: 'ri-time-line', title: '时间管理', desc: '日程、提醒、规划' },
            { icon: 'ri-book-open-line', title: '学习助手', desc: '笔记、复习、计划' },
            { icon: 'ri-heart-pulse-line', title: '健康管理', desc: '运动、饮食、睡眠' },
            { icon: 'ri-cloud-line', title: '天气查询', desc: '预报、提醒、建议' },
            { icon: 'ri-newspaper-line', title: '新闻资讯', desc: '热点、趋势、摘要' }
        ];

        const App = () => {
            const [messages, setMessages] = useState([]);
            const [inputValue, setInputValue] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const messagesEndRef = useRef(null);
            const [mounted, setMounted] = useState(false);

            useEffect(() => {
                setMounted(true);
                // 加载历史消息
                const savedMessages = localStorage.getItem('ai_assistant_messages');
                if (savedMessages) {
                    setMessages(JSON.parse(savedMessages));
                } else {
                    // 显示欢迎消息
                    const welcomeMsg = {
                        id: Date.now(),
                        role: 'assistant',
                        content: `👋 欢迎使用AI智能数字人秘书！

我是您的智能助手，拥有多种技能，随时为您服务：

✨ **核心功能**
• 💬 智能对话 - 自然语言交流
• 📝 任务管理 - 待办、提醒、清单
• 💡 灵感记录 - 捕捉创意想法
• 📚 知识问答 - 解答疑问
• 🌐 智能翻译 - 多语言支持
• 🧮 计算工具 - 数学计算

🎯 **使用方法**
直接输入您的问题或需求，我会智能识别并帮助您！

**例如：**
• "帮我添加一个任务：明天下午3点开会"
• "解释什么是人工智能"
• "把这句话翻译成英文"
• "计算 25 * 4"

现在，有什么我可以帮您的吗？`
                    };
                    setMessages([welcomeMsg]);
                }
            }, []);

            useEffect(() => {
                scrollToBottom();
            }, [messages, isTyping]);

            useEffect(() => {
                if (mounted) {
                    localStorage.setItem('ai_assistant_messages', JSON.stringify(messages));
                }
            }, [messages, mounted]);

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!inputValue.trim()) return;

                const userMessage = inputValue;
                setMessages(prev => [...prev, {
                    id: Date.now(),
                    role: 'user',
                    content: userMessage
                }]);
                setInputValue('');
                setIsTyping(true);

                // 模拟AI思考和生成回复
                await new Promise(resolve => setTimeout(resolve, 1500 + Math.random() * 1000));

                const aiResponse = generateAIResponse(userMessage, messages);

                setMessages(prev => [...prev, {
                    id: Date.now(),
                    role: 'assistant',
                    content: aiResponse
                }]);
                setIsTyping(false);
            };

            const handleSkillClick = (skill) => {
                const skillPrompts = {
                    '任务管理': '我想使用任务管理功能',
                    '灵感记录': '我想记录一个灵感',
                    '知识问答': '我想问一个问题',
                    '智能翻译': '我需要翻译',
                    '计算工具': '我需要计算',
                    '时间管理': '我想设置日程提醒',
                    '学习助手': '我想制定学习计划',
                    '健康管理': '我想管理健康',
                    '天气查询': '查询天气',
                    '新闻资讯': '获取新闻'
                };

                const prompt = skillPrompts[skill.title] || `我想使用${skill.title}功能`;
                setInputValue(prompt);
            };

            if (!mounted) return <div className="container">加载中...</div>;

            return (
                <div className="container">
                    <div className="header">
                        <div className="header-left">
                            <div className="avatar">🤖</div>
                            <div className="title">
                                <h1>AI智能数字人秘书</h1>
                                <p>10+种智能技能，随时待命</p>
                            </div>
                        </div>
                        <div className="status-badge">✅ 在线</div>
                    </div>

                    <div className="chat-area">
                        {messages.map((msg) => (
                            <div key={msg.id} className={`message ${msg.role}`}>
                                {msg.role === 'assistant' && (
                                    <div className="message-avatar">
                                        <i className="ri-robot-line" style={{ fontSize: 20 }}></i>
                                    </div>
                                )}
                                <div className="message-content">
                                    <pre style={{ whiteSpace: 'pre-wrap', fontFamily: 'inherit', margin: 0 }}>
                                        {msg.content}
                                    </pre>
                                </div>
                                {msg.role === 'user' && (
                                    <div className="message-avatar">
                                        <i className="ri-user-line" style={{ fontSize: 20 }}></i>
                                    </div>
                                )}
                            </div>
                        ))}

                        {isTyping && (
                            <div className="message assistant">
                                <div className="message-avatar">
                                    <i className="ri-robot-line" style={{ fontSize: 20 }}></i>
                                </div>
                                <div className="message-content">
                                    <div className="typing-indicator">
                                        <span></span>
                                        <span></span>
                                        <span></span>
                                    </div>
                                </div>
                            </div>
                        )}

                        <div ref={messagesEndRef} />

                        {messages.length === 1 && (
                            <div className="welcome-skills">
                                <h3>🚀 快速开始 - 选择技能</h3>
                                <div className="skills-grid">
                                    {skills.map((skill, index) => (
                                        <div
                                            key={index}
                                            className="skill-card"
                                            onClick={() => handleSkillClick(skill)}
                                        >
                                            <div className="skill-icon">
                                                <i className={skill.icon}></i>
                                            </div>
                                            <div className="skill-info">
                                                <h4>{skill.title}</h4>
                                                <p>{skill.desc}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="input-area">
                        <form className="input-form" onSubmit={handleSubmit}>
                            <input
                                type="text"
                                value={inputValue}
                                onChange={(e) => setInputValue(e.target.value)}
                                placeholder="输入您的问题或需求..."
                                disabled={isTyping}
                            />
                            <button type="submit" disabled={isTyping || !inputValue.trim()}>
                                {isTyping ? '思考中...' : '发送'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
